name: Publish package and create release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.ref_name != 'v0.1.2' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release tag matches package version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          package_version="$(node --print "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "v${package_version}" ]]; then
            echo "Release tag must be v${package_version}." >&2
            exit 1
          fi

      - run: npm publish

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$RELEASE_TAG" --verify-tag --generate-notes --title "$RELEASE_TAG"
