name: Publish package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing automated release tag to publish
        required: true
        type: string

permissions: {}

env:
  RELEASE_TAG: ${{ inputs.release_tag }}

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ inputs.release_tag != 'v0.1.2' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.release_tag }}

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be a semantic version beginning with v." >&2
            exit 1
          fi

          package_version="$(node --print "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "v${package_version}" ]]; then
            echo "Release tag must be v${package_version}." >&2
            exit 1
          fi

          release_tag="$(gh release view "$RELEASE_TAG" --json tagName --jq .tagName)"
          if [[ "$release_tag" != "$RELEASE_TAG" ]]; then
            echo "GitHub Release $RELEASE_TAG was not found." >&2
            exit 1
          fi

      - run: npm publish
