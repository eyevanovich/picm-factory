name: Publish package to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(node --print "require('./package.json').version")"
          if [[ "${{ github.event.release.tag_name }}" != "v${package_version}" ]]; then
            echo "Release tag must be v${package_version}." >&2
            exit 1
          fi

      - run: npm publish
